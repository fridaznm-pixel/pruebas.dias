<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Días de la Semana</title>

    <script>
        function mostrarDias() {
            let dias = [
                "Lunes",
                "Martes",
                "Miércoles",
                "Jueves",
                "Viernes",
                "Sábado",
                "Domingo"
            ];

            let resultado = "";

            for (let i = 0; i < dias.length; i++) {
                resultado += "Día " + (i + 1) + ": " + dias[i] + "<br>";
            }

            document.getElementById("listaDias").innerHTML = resultado;
        }
    </script>
</head>

<body>

    <h2>Días de la Semana</h2>

    <button onclick="mostrarDias()">Mostrar días</button>

    <br><br>

    <div id="listaDias"></div>

</body>
</html>
